name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

template: |
  ## What’s Changed

  $CHANGES

categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'

  - title: 'Bug Fixes'
    labels:
      - 'bug'
      - 'fix'

  - title: 'Maintenance'
    labels:
      - 'chore'
      - 'dependencies'
      - 'documentation'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'breaking-change'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'fix'
      - 'chore'
      - 'dependencies'
      - 'documentation'
  default: patch